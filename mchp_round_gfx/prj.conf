# Enable console output
CONFIG_PRINTK=y

# Configure SPI
CONFIG_GPIO=y
CONFIG_SPI=y

CONFIG_LOG=n
CONFIG_PINCTRL_LOG_LEVEL_DBG=n

CONFIG_INPUT=y
CONFIG_GPIO_SAM0=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192

CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_TICKLESS_KERNEL=n
CONFIG_LV_CONF_MINIMAL=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_ARC=n
CONFIG_LV_USE_BAR=n
CONFIG_LV_USE_CHART=n
CONFIG_LV_USE_DROPDOWN=n
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_SLIDER=n
CONFIG_LV_USE_TEXTAREA=n
CONFIG_LV_USE_CANVAS=n
# CONFIG_LV_USE_ANIMATION=n
CONFIG_LV_USE_THEME_DEFAULT=n
CONFIG_LV_USE_THEME_MONO=n
# CONFIG_LV_USE_DRAW_SW_COMPLEX=n
CONFIG_LV_USE_THEME_DEFAULT=y